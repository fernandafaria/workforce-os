  - PSD hiring (Poor, Smart, Deep desire to get rich)
  - Zero-Based Budgeting (orçamento começa do zero todo ano)
  - Meritocracia radical (remuneração variável, promoção por performance)
  - M&A em escala global (roll-up de indústria fragmentada)
  - Conselhos enxutos (poucas pessoas, muito alinhamento)
  - Lifelong learning (aprendizado contínuo, "aos 77 anos ainda estou na praia aprendendo")

