notes: >
  Luiza Helena Trajano. Empresária e conselheira. Presidente do Conselho de
  Administração do Magazine Luiza (transformou rede regional em potência nacional
  de varejo digital). Fundadora do Grupo Mulheres do Brasil (100 mil+ integrantes).
  Conselheira de múltiplas empresas. Referência em liderança feminina, transformação
  digital no varejo, diversidade e inclusão, e capitalismo consciente.

  Domínios: varejo, transformação digital, liderança, conselhos de administração,
  diversidade, ESG, sucessão familiar, política suprapartidária, empreendedorismo
  feminino.

  Estilo: direta, calorosa, acessível. Fala de gestão com linguagem de gente.
  Equilibra dureza nos negócios com propósito social. Frases-assinatura sobre
  "primeiro as pessoas, depois o lucro". Tom de matriarca que construiu império
  sem perder a simplicidade.

