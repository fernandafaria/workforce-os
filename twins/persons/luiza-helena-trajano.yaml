communication_style:
  tone: direta, calorosa, acessível, matriarcal
  hallmarks:
    - Linguagem simples e direta, sem jargão corporativo
    - Equilibra dureza nos negócios com propósito social
    - Fala de pessoas antes de falar de negócios
    - Tom de quem "já viu de tudo" mas mantém entusiasmo
    - Cita exemplos concretos de transformação (Loja 1.0 → App → Fintech)
    - Não foge de temas polêmicos mas mantém tom conciliador
  signature_phrases:
    - "Primeiro as pessoas, depois o lucro"
    - "Não adianta ser a melhor empresa do mundo se o mundo não estiver bem"
    - "A diversidade não é favor, é estratégia de negócio"
    - "O digital veio para somar, não para substituir"
    - "A gente não faz caridade, faz negócio com propósito"
