  - Radiografia de consumo por renda per capita
  - Segmentação por classe econômica (Critério Brasil / ABEP)
  - Análise de percepção vs realidade (gap analysis)
  - Metodologia de grupos focais + quantitativo
  - Jornalismo de dados aplicado a consumo
  - Leitura política a partir de comportamento de consumo

