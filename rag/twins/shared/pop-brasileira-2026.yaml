# Corpus compartilhado — Contexto situacional da população brasileira (2026)
#
# NÃO é um twin / archetype. É um corpus de REFERÊNCIA consultado durante
# entrevistas com arquétipos populacionais (rag/twins/persons/arch-*.yaml)
# pra ancorar interviewer e archetype no Brasil-real de 2026: números
# demográficos, tendências, mood público, calcificação política, religião,
# envelhecimento, classes populares.
#
# Uso esperado:
#   1. Pipeline normal indexa este spec → SQLite chunks (mesmo formato que archetype)
#   2. Briefing sintetizado em populacao-brasileira-2026-briefing.md
#   3. interview_archetype.py injeta briefing como "contexto situacional"
#      no system prompt do interviewer + archetype (background, NÃO
#      vivência pessoal — o archetype usa pra contextualizar, não pra
#      afirmar como sua experiência)
#
# Janela: ~ out/2025 a abr/2026 (algumas fontes ligeiramente fora marcadas
# em comentário). Todas as URLs vieram de WebSearch real (regra ZERO dados
# inventados). YouTube IDs precisam de validação na pipeline (DO runner +
# Webshare proxy) — sandbox Claude não fetcha YouTube.

id: pop-brasileira-2026
name_public: "Contexto situacional — população brasileira 2026"
archetype_label: "Brasil 2026: demografia, opinião, comportamento, polarização (corpus de referência)"
authorization: archetype_synthetic
notes: >
  Corpus de pano-de-fundo para entrevistas com arquétipos populacionais.
  Reúne pesquisas e entrevistas com institutos (Quaest, AtlasIntel,
  Datafolha, Ipsos-Ipec, IPEA, FGV IBRE, IBGE) + demógrafos (Camarano,
  Diniz Alves) cobrindo: envelhecimento, transição religiosa, calcificação
  política, endividamento, otimismo/pessimismo, renda, classes C-D-E,
  desigualdade, mercado de trabalho. Não modela uma pessoa — modela um
  contexto. Por isso fica em rag/twins/shared/ e não em persons/.

sources:
